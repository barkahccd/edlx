<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 400px; font-family: -apple-system, system-ui, sans-serif; padding: 16px; background: #1a1a2e; color: #eee; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #00d4aa; }
    .section { margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    textarea { width: 100%; height: 60px; background: #16213e; color: #0f0; border: 1px solid #333; border-radius: 6px; padding: 8px; font-family: monospace; font-size: 11px; resize: none; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #00d4aa; color: #1a1a2e; }
    .btn-primary:hover { background: #00b894; }
    .btn-secondary { background: #0f3460; color: #eee; }
    .btn-secondary:hover { background: #16213e; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-group { display: flex; gap: 6px; }
    .btn-group button { flex: 1; }
    #status { margin-top: 8px; font-size: 12px; min-height: 18px; }
    .success { color: #00d4aa; }
    .error { color: #e74c3c; }
    .info { color: #f39c12; }
    .token-info { font-size: 11px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>🍪 Edel Cookie Exporter</h2>
  
  <div class="section">
    <label>Account ID (contoh: acc1, acc2)</label>
    <input type="text" id="accId" value="acc1" style="width:100%;background:#16213e;color:#eee;border:1px solid #333;border-radius:6px;padding:8px;font-family:monospace;font-size:13px;">
  </div>

  <div class="section">
    <label>edel_session cookie</label>
    <textarea id="cookieOutput" readonly placeholder="Klik tombol di bawah untuk mengambil cookie..."></textarea>
  </div>

  <button class="btn-primary" id="copyBtn">📋 Copy & Siap Kirim</button>
  
  <div class="btn-group">
    <button class="btn-secondary" id="refreshBtn">🔄 Ambil Cookie</button>
    <button class="btn-danger" id="clearBtn">🗑️ Clear</button>
  </div>

  <div id="status"></div>
  <div class="token-info" id="tokenInfo"></div>

  <script src="popup.js"></script>
</body>
</html>
